# ════════════════════════════════════════════════════════════════════════════════
# AutoMart — Docker Compose (PostgreSQL + Redis)
# ════════════════════════════════════════════════════════════════════════════════
# Usage:
#   docker compose up --build          # build + run everything
#   docker compose up -d               # run in background
#   docker compose down -v             # stop + remove volumes (fresh DB)
#   docker compose logs -f auth        # follow one service's logs
# ════════════════════════════════════════════════════════════════════════════════

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    env_file: .env.docker
    command: redis-server --requirepass ${REDIS_PASSWORD:-automart-redis-secret}
    # SEC-2: No host port mapping — only accessible from within Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-automart-redis-secret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - automart-net

  # ── Backend Services ─────────────────────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env.docker
    # SEC-2: No host port — only accessible via gateway
    environment:
      - JWT_SECRET=${JWT_SECRET:-automart-docker-secret}
      - AUTH_SERVICE_PORT=3001
      - REDIS_URL=redis://:${REDIS_PASSWORD:-automart-redis-secret}@redis:6379
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - automart-net

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    env_file: .env.docker
    # SEC-2: No host port — only accessible via gateway
    environment:
      - PRODUCT_SERVICE_PORT=3002
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - automart-net

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    env_file: .env.docker
    # SEC-2: No host port — only accessible via gateway
    environment:
      - SEARCH_SERVICE_PORT=3003
    depends_on:
      product-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - automart-net

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    env_file: .env.docker
    # SEC-2: No host port — only accessible via gateway
    environment:
      - ORDER_SERVICE_PORT=3004
      - REDIS_URL=redis://:${REDIS_PASSWORD:-automart-redis-secret}@redis:6379
      - FRONTEND_URL=http://localhost:3080
      - API_URL=http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - automart-net

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    env_file: .env.docker
    # SEC-2: No host port — only accessible via gateway
    environment:
      - INVENTORY_SERVICE_PORT=3005
      - REDIS_URL=redis://:${REDIS_PASSWORD:-automart-redis-secret}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - automart-net

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    env_file: .env.docker
    # SEC-2: No host port — only accessible via gateway
    environment:
      - NOTIFICATION_SERVICE_PORT=3006
      - REDIS_URL=redis://:${REDIS_PASSWORD:-automart-redis-secret}@redis:6379
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - automart-net

  mcp-server:
    build:
      context: .
      dockerfile: services/mcp-server/Dockerfile
    env_file: .env.docker
    # SEC-2: No host port — only accessible via gateway
    environment:
      - MCP_SERVER_PORT=3007
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3007/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - automart-net

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file: .env.docker
    ports:
      - "3000:3000"
    environment:
      - API_GATEWAY_PORT=3000
      - JWT_SECRET=${JWT_SECRET:-automart-docker-secret}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3080}
      # Service discovery via Docker DNS (service name = hostname)
      - AUTH_SERVICE_PORT=3001
      - PRODUCT_SERVICE_PORT=3002
      - SEARCH_SERVICE_PORT=3003
      - ORDER_SERVICE_PORT=3004
      - INVENTORY_SERVICE_PORT=3005
      - NOTIFICATION_SERVICE_PORT=3006
    depends_on:
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - automart-net

  # ── Frontend ─────────────────────────────────────────────────────────────────

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env.docker
    ports:
      - "3080:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - automart-net

networks:
  automart-net:
    driver: bridge
