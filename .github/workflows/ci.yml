name: CI

on:
  push:
    branches: [sanjay]
  pull_request:
    branches: [main]

jobs:
  # ── Backend TypeScript Build (parallel per service) ───────────────────────
  backend-build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, product-service, order-service, inventory-service, api-gateway, search-service, notification-service, mcp-server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Generate Prisma Client
        if: contains(fromJson('["auth-service","product-service","order-service","inventory-service"]'), matrix.service)
        working-directory: services/${{ matrix.service }}
        run: npx prisma generate
      - name: Type check
        working-directory: services/${{ matrix.service }}
        run: npx tsc --noEmit

  # ── Unit Tests ───────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Run search-service tests (Trie)
        working-directory: services/search-service
        run: npx vitest run

  # ── Frontend Build ───────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Build
        working-directory: apps/web
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  # ── Docker Build Check ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build all service images
        run: |
          for svc in auth-service product-service order-service inventory-service search-service notification-service api-gateway mcp-server; do
            echo "Building $svc..."
            docker build -f services/$svc/Dockerfile -t automart/$svc:ci . || exit 1
          done
      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t automart/web:ci .

  # ── E2E Tests (requires Docker Compose stack) ───────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend-build, docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps
      - name: Create .env.docker from example
        run: |
          cp .env.docker.example .env.docker
          # Inject secrets from GitHub Actions secrets
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env.docker
      - name: Start full stack
        run: docker compose up -d --build --wait
        timeout-minutes: 10
      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose logs --tail=100
          docker compose ps -a
      - name: Wait for API Gateway
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/health | grep -q '"status":"ok"'; then
              echo "API Gateway ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test --project=chromium
        env:
          BASE_URL: http://localhost:3080
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
      - name: Shutdown
        if: always()
        run: docker compose down -v
